name: Encyclopedia Entry
description: Request a new nursing encyclopedia entry covering a concept, term, or clinical procedure.
title: '[Encyclopedia]: '
labels:
  - bsn
  - encyclopedia
body:
  - type: markdown
    attributes:
      value: |
        Use this template to request a new **encyclopedia entry** for the BSN curriculum site.
        The BSN Curriculum Agent will produce a clinically accurate, academically styled entry
        placed in the `src/content/encyclopedia/` collection, with frontmatter aligned to the
        encyclopedia schema.

        Comprehensive nursing encyclopedia entries should cover the full scope of relevant
        nursing information, including **pathophysiology, clinical presentation, diagnostic
        studies, nursing assessment, nursing interventions, pharmacological considerations,
        patient and family education, and complications**. Complete as many fields below as
        possible — the more context you provide, the more comprehensive and accurate the
        resulting entry.

  - type: input
    id: title
    attributes:
      label: Entry Title *
      description: The concept, term, condition, or procedure the entry should cover.
      placeholder: 'e.g., Therapeutic Communication'
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary / Overview *
      description: >
        A one-to-two sentence description of what this entry should explain. This will seed
        the `summary` frontmatter field and the opening paragraph of the entry.
      placeholder: >
        e.g., Therapeutic communication describes the purposeful, patient-centered verbal
        and non-verbal techniques nurses use to build trust, gather accurate health histories,
        and support emotional well-being across the care continuum.
    validations:
      required: true

  - type: input
    id: slug
    attributes:
      label: Preferred File Slug
      description: >
        Desired filename (without `.mdx`) for `src/content/encyclopedia/`. Use lowercase
        kebab-case. Leave blank to let the agent choose.
      placeholder: 'e.g., therapeutic-communication'

  - type: textarea
    id: tags
    attributes:
      label: Tags
      description: >
        Comma-separated tags to categorise this entry (e.g., topic area, body system,
        care setting). These populate the `tags` frontmatter array.
      placeholder: 'e.g., communication, fundamentals, mental health, patient-centered care'

  - type: checkboxes
    id: content_sections
    attributes:
      label: Content Sections to Include *
      description: >
        Select every section this encyclopedia entry should cover. For clinical condition
        entries, **pathophysiology, nursing assessment, nursing interventions, and patient
        education** should always be checked. The agent will generate a dedicated section
        for each selection and declare them in the `contentSections` frontmatter field.
      options:
        - label: 'Overview / Introduction'
          required: true
        - label: 'Pathophysiology (mechanisms of disease/injury, cellular and systemic effects)'
        - label: 'Clinical Presentation / Signs and Symptoms'
        - label: 'Diagnostic Studies and Laboratory Findings'
        - label: 'Nursing Assessment (subjective data, objective data, focused exam findings)'
        - label: 'Nursing Interventions (evidence-based actions, priorities, delegation)'
        - label: 'Pharmacological Considerations (drug classes, nursing implications, monitoring)'
        - label: 'Patient and Family Education'
        - label: 'Complications and Nursing Implications'
        - label: 'Special Populations / Lifespan Considerations'
        - label: 'Evidence Base and Clinical Guidelines'
        - label: 'NCLEX-NG Formative Check Questions (2–4 NGN-style items)'

  - type: textarea
    id: pathophysiology_notes
    attributes:
      label: Pathophysiology Notes
      description: >
        Key pathophysiological mechanisms the entry must explain. Include disease stages,
        cascades, affected organ systems, or compensatory responses as relevant.
      placeholder: |
        e.g., Describe the inflammatory cascade that leads to alveolar damage in ARDS,
        including the role of cytokines, surfactant loss, and compliance changes.

  - type: textarea
    id: nursing_considerations
    attributes:
      label: Nursing Considerations
      description: >
        Specific nursing priorities, assessment findings, safety concerns, or
        evidence-based interventions the agent must address. Include any
        high-risk situations, delegation boundaries, or scope-of-practice notes.
      placeholder: |
        e.g., Monitor fluid balance every 4 hours; restrict IV fluids per order.
        Assess for signs of fluid overload: crackles, JVD, peripheral edema.
        Do not administer nephrotoxic agents without provider confirmation of renal function.

  - type: textarea
    id: pharmacological_notes
    attributes:
      label: Pharmacological Considerations
      description: >
        Drug classes, specific agents, nursing implications, patient monitoring
        parameters, or adverse effects the entry must address.
      placeholder: |
        e.g., Loop diuretics (furosemide) — monitor I&O, electrolytes, BUN/Cr.
        ACE inhibitors — hold if SBP < 100 or Cr rises > 30% from baseline.
        Avoid NSAIDs and contrast dye in patients at risk.

  - type: textarea
    id: patient_education_notes
    attributes:
      label: Patient and Family Education Topics
      description: >
        Key teaching points the entry must include for patients and families
        (e.g., dietary restrictions, activity guidelines, when to call the provider,
        follow-up expectations, medication adherence).
      placeholder: |
        e.g., Low-sodium diet (< 2 g/day), daily weights, signs of fluid retention,
        follow-up labs, importance of medication adherence.

  - type: dropdown
    id: aacn_essentials
    attributes:
      label: Primary AACN Essentials Domain
      description: The AACN (2021) domain most closely aligned with this entry.
      options:
        - D1 — Knowledge for Nursing Practice
        - D2 — Person-Centered Care
        - D3 — Population Health
        - D4 — Scholarship for the Nursing Discipline
        - D5 — Quality and Safety
        - D6 — Interprofessional Partnerships
        - D7 — Systems-Based Practice
        - D8 — Informatics and Healthcare Technologies
        - D9 — Professionalism
        - D10 — Personal, Professional, and Leadership Development
        - Not applicable / unsure

  - type: dropdown
    id: bloom_level
    attributes:
      label: Intended Bloom's Taxonomy Level
      description: >
        The primary cognitive depth this entry should support in learners.
      options:
        - Remember
        - Understand
        - Apply
        - Analyze
        - Evaluate
        - Create

  - type: textarea
    id: learning_objectives
    attributes:
      label: Learning Objectives
      description: >
        Optional list of learning objectives this entry should address (one per line).
        Use Bloom's action verbs. The agent will use these to align section content
        and any embedded NCLEX-NG questions.
      placeholder: |
        e.g.,
        Define therapeutic communication and distinguish it from social conversation.
        Apply active-listening techniques during a simulated patient interaction.
        Analyze barriers to effective nurse–patient communication in diverse populations.

  - type: textarea
    id: key_concepts
    attributes:
      label: Additional Key Concepts to Include
      description: >
        Any specific subtopics, clinical examples, techniques, procedures, or terminology
        not captured above that the entry must address.
      placeholder: |
        e.g., active listening, open-ended questions, reflection, clarification,
        non-verbal cues, cultural humility, SBAR as a communication framework

  - type: textarea
    id: related_entries
    attributes:
      label: Related Encyclopedia Entries or Courses
      description: >
        List any existing encyclopedia entries, courses, or notes this entry should
        cross-reference (slugs or titles).
      placeholder: 'e.g., chain-of-infection, sterile-technique, NUR 201 — Health Assessment'

  - type: textarea
    id: special_instructions
    attributes:
      label: Special Instructions for the Agent
      description: >
        Any additional guidance on depth, format, standards alignment, audience level,
        or callout boxes to include.
      placeholder: |
        e.g., Target BSN-2 students. Include a clinical-alert callout about documentation
        of patient communication. Align to QSEN Patient-Centered Care competency.
        Add a 3-question NCLEX-NG formative check at the end.
