name: Note Submission
description: Submit a raw note to be cleaned, organized, and converted into a structured note draft.
title: '[Note]: '
labels:
  - note
  - submission
body:
  - type: markdown
    attributes:
      value: |
        Use this template to submit rough notes. The agent will clean, organize, label, and cross-reference them.
        If the agent confidence is low the note will be placed in **needs-review** state and not published automatically.

  - type: input
    id: title
    attributes:
      label: Suggested Title
      description: A short title for the note.
      placeholder: 'Meeting notes on protected content workflow'
    validations:
      required: true

  - type: textarea
    id: raw_notes
    attributes:
      label: Raw Notes
      description: Paste your raw notes here.
      placeholder: |
        Enter your raw notes...
    validations:
      required: true

  - type: dropdown
    id: visibility
    attributes:
      label: Visibility
      description: Should this note be public, private, or protected?
      options:
        - public
        - private
        - protected
    validations:
      required: true

  - type: dropdown
    id: note_type
    attributes:
      label: Note Type
      description: What kind of note is this?
      options:
        - general
        - meeting
        - idea
        - reference
        - task
        - research
    validations:
      required: false

  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma-separated tags for the note.
      placeholder: 'astro, notes, workflow'

  - type: input
    id: source_issue
    attributes:
      label: Source / Reference URL
      description: URL of a related issue, article, or external resource that this note is based on.
      placeholder: 'https://github.com/sagreenxyz/astro2/issues/123'

  - type: input
    id: related_links
    attributes:
      label: Related Internal Links
      description: Comma-separated paths to related pages in this site.
      placeholder: '/notes/project-setup, /encyclopedia/some-topic'

  - type: checkboxes
    id: processing
    attributes:
      label: Processing Options
      options:
        - label: Convert this issue into a structured note draft
          required: true
        - label: Cross-reference related repository content
        - label: Place the result on the protected/private side if visibility requires it
        - label: Flag for manual review before publishing if agent confidence is low
