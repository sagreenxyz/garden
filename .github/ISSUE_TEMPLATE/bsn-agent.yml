name: Invoke BSN User Agent
description: Submit a note or request for BSN processing, cleanup, and cross-referencing.
title: '[BSN]: '
labels:
  - bsn
  - note
  - submission
body:
  - type: markdown
    attributes:
      value: |
        Use this template to explicitly invoke the BSN user agent to clean, structure, and cross-reference a note.
        If the agent confidence is low the note will be placed in **needs-review** state and not published automatically.

  - type: textarea
    id: raw_notes
    attributes:
      label: Raw Notes
      description: Paste the content to be processed by BSN.
      placeholder: |
        Enter the notes you want BSN to clean up...
    validations:
      required: true

  - type: dropdown
    id: output_mode
    attributes:
      label: Desired Output
      description: What should BSN create?
      options:
        - Draft note only
        - Private note page
        - Public note page
    validations:
      required: true

  - type: dropdown
    id: visibility
    attributes:
      label: Visibility
      description: Should the note be public, private, or protected?
      options:
        - public
        - private
        - protected
    validations:
      required: true

  - type: dropdown
    id: note_type
    attributes:
      label: Note Type
      description: What kind of note is this?
      options:
        - general
        - meeting
        - idea
        - reference
        - task
        - research
    validations:
      required: false

  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma-separated tags for the note.
      placeholder: 'bsn, notes, workflow'

  - type: input
    id: source_issue
    attributes:
      label: Source / Reference URL
      description: URL of the originating issue or external reference for this note.
      placeholder: 'https://github.com/sagreenxyz/astro2/issues/123'

  - type: input
    id: related_links
    attributes:
      label: Related Internal Links
      description: Comma-separated paths to related pages in this site.
      placeholder: '/notes/index, /encyclopedia/topic'

  - type: checkboxes
    id: processing
    attributes:
      label: BSN Actions
      options:
        - label: Invoke BSN processing
          required: true
        - label: Clean and organize the note
          required: true
        - label: Cross-reference internal repository content
        - label: Keep the result protected/private if visibility requires it
        - label: Flag for review if the agent confidence is low before publishing
        - label: Check for duplicate or near-duplicate notes before publishing
