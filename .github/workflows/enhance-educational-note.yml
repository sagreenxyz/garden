name: BSN Expert Note Enhancement

on:
  push:
    branches: [main]
    paths:
      - 'src/content/notes/**.mdx'
  issues:
    types: [labeled]

jobs:
  detect-educational-notes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      files: ${{ steps.changed.outputs.files }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed educational notes
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- 'src/content/notes/**/*.mdx' 'src/content/notes/*.mdx' | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT

  expert-review:
    needs: detect-educational-notes
    if: needs.detect-educational-notes.outputs.files != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run expert enhancement script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          CHANGED_FILES: ${{ needs.detect-educational-notes.outputs.files }}
        run: node scripts/enhance-educational-note.mjs
