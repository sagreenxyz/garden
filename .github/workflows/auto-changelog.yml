name: Auto-generate Changelog Entries

# Runs when new content files are pushed to the tracked collections.
# Detects added files, generates a changelog MDX entry for each one,
# and commits the result back to main so the What's New page stays current.
#
# The `paths` filter intentionally excludes src/content/changelog/ so that
# the commit made by this workflow does not trigger it a second time.
# The deploy workflow (no paths filter) will pick up the changelog commit
# and publish the updated site.

on:
  push:
    branches:
      - main
    paths:
      - 'src/content/encyclopedia/**'
      - 'src/content/courses/**'
      - 'src/content/pharmacology/**'
      - 'src/content/paths/**'

permissions:
  contents: write

jobs:
  generate-changelog:
    name: Generate Changelog Entries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history is needed so git diff can compare before/after SHAs
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Generate changelog entries
        run: node .github/scripts/generate-changelog.mjs
        env:
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}

      - name: Commit changelog entries
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/changelog/
          if git diff --staged --quiet; then
            echo "No new changelog entries to commit."
          else
            git commit -m "chore: auto-generate changelog entries"
            git push
          fi
